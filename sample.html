<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diffie-Hellman Key Exchange Demo</title>
  <!-- <style>
    body { font-family: Arial, sans-serif; margin: 40px; }
    .box { max-width: 700px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
    input, button { margin: 8px 0; padding: 8px; width: 100%; }
    pre { background: #f4f4f4; padding: 12px; border-radius: 8px; }
  </style> -->
</head>
<body>
  <!-- <div class="box"> -->
    <h2>Diffie-Hellman Key Exchange (Alice & Bob)</h2>
    <label>Prime Number (p):</label>
    <input type="number" id="p" value="23">
<br>
    <label>Primitive Root (g):</label>
    <input type="number" id="g" value="5">
<br>
    <label>Alice Private Key:</label>
    <input type="number" id="alice" value="6">
<br>
    <button onclick="runDH()">Generate Shared Secret</button>

    <pre id="output"></pre>
  <!-- </div> -->

  <script>
    function powerMod(base, exp, mod) {
      let result = 1;
      for (let i = 0; i < exp; i++) {
        result = (result * base) % mod;
      }
      return result;
    }

    function runDH() {
      const p = parseInt(document.getElementById('p').value);
      const g = parseInt(document.getElementById('g').value);
      const alicePrivate = parseInt(document.getElementById('alice').value);

      // Bob private key generated by JavaScript app
      const bobPrivate = 15;

      const alicePublic = powerMod(g, alicePrivate, p);
      const bobPublic = powerMod(g, bobPrivate, p);

      const aliceSecret = powerMod(bobPublic, alicePrivate, p);
      const bobSecret = powerMod(alicePublic, bobPrivate, p);

      document.getElementById('output').textContent =
        `Alice Public Key: ${alicePublic}\n` +
        `Bob Public Key: ${bobPublic}\n` +
        `Alice Shared Secret: ${aliceSecret}\n` +
        `Bob Shared Secret: ${bobSecret}\n` +
        `Key Exchange Successful: ${aliceSecret === bobSecret}`;
    }
  </script>
</body>
</html>
